services:
  mees-space:
    build: .
    container_name: mees-space
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./content:/app/content
      - ./uploads:/app/uploads
      - ./mees.db:/app/mees.db
    env_file: .env
    environment:
      MEES_PORT: "8081"
      MEES_DATABASE_PATH: "/app/mees.db"
      MEES_CONTENT_DIR: "/app/content"
      MEES_UPLOADS_DIR: "/app/uploads"
      MEES_DIST_DIR: "/app/dist"